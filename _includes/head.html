<!doctype html>
<html lang="en-PH">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <meta name="description" content="{{ description }}">
  <link rel="canonical" href="{{ canonical or 'https://spinex.news' }}">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="SPINEX News">
  <meta property="og:title" content="{{ title }}">
  <meta property="og:description" content="{{ description }}">
  <meta property="og:url" content="{{ canonical or 'https://spinex.news' }}">
  <meta property="og:image" content="{{ ogImage or '/assets/banners/main-banner.jpg' }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ title }}">
  <meta name="twitter:description" content="{{ description }}">
  <meta name="twitter:image" content="{{ ogImage or '/assets/banners/main-banner.jpg' }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/brand/spinex-logo.png">
  <link rel="stylesheet" href="/css/style.css">
  <script type="application/ld+json">
  [
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SPINEX News",
      "url": "https://spinex.news",
      "logo": "https://spinex.news/assets/brand/spinex-logo.png",
      "sameAs": ["https://www.spinex.fun/"]
    },
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SPINEX News",
      "url": "https://spinex.news",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://spinex.news/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  ]
  </script>
</head>
<body>
{% include "header.html" %}
